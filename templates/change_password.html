{{template "header.html" .}}

<h1 class="mb-4">Change Password</h1>

{{if .error}}<div class="alert alert-danger alert-dismissible fade show" role="alert">{{.error}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{{end}}
{{if .success}}<div class="alert alert-success alert-dismissible fade show" role="alert">{{.success}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{{end}}

<form method="POST" action="/user/change-password">
<input type="hidden" name="csrf_token" value="{{.csrf_token}}">
    <div class="mb-3">
        <label for="old_password" class="form-label">Old Password</label>
        <div class="input-group">
            <input type="password" class="form-control" id="old_password" name="old_password" required>
            <span class="input-group-text" id="old_password_toggle" style="cursor:pointer">
                <i class="bi bi-eye-fill"></i>
            </span>
        </div>
    </div>

    <div class="mb-3">
        <label for="new_password" class="form-label">New Password</label>
        <div class="input-group">
            <input type="password" class="form-control" id="new_password" name="new_password" required>
            <span class="input-group-text" id="new_password_toggle" style="cursor:pointer">
                <i class="bi bi-eye-fill"></i>
            </span>
        </div>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn" disabled>Change Password</button>
</form>

{{template "footer.html"}}

<script>
    const oldPassword = document.getElementById('old_password');
    const newPassword = document.getElementById('new_password');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInputs = document.querySelectorAll('input[type="password"]');
    const toggleIcons = document.querySelectorAll('.input-group-text');

    function validateForm() {
        const isValid = oldPassword.value.length >= 8 && newPassword.value.length >= 8;
        submitBtn.disabled = !isValid;
    }

    oldPassword.addEventListener('input', validateForm);
    newPassword.addEventListener('input', validateForm);

    passwordInputs.forEach((input, index) => {
        const toggleIcon = toggleIcons[index];
        toggleIcon.addEventListener('click', () => {
            if (input.type === "password") {
                input.type = "text";
                toggleIcon.innerHTML = '<i class="bi bi-eye-slash-fill"></i>'; 
            } else {
                input.type = "password";
                toggleIcon.innerHTML = '<i class="bi bi-eye-fill"></i>'; 
            }
        });
    });
</script>
