{{template "header.html" .}}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Login</h2>

        {{if .error}}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{.error}}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {{end}}

        {{if .success}}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{.success}}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {{end}}

        <form method="POST" action="/auth/login" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{.csrf_token}}">
            <div class="mb-3">
                <label for="username" class="form-label">Username/Email</label>
                <input type="text" class="form-control" name="identifier" id="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" name="password" id="password" required>
                    <span class="input-group-text" id="password-toggle" style="cursor:pointer">
                        <i class="bi bi-eye-fill"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn" disabled>Login</button>
        </form>

        <div class="mt-3">
            <a href="/auth/forgot-password" class="text-decoration-none">Forgot Password?</a>
        </div>
    </div>
</div>
{{template "footer.html"}}

<script>
const form = document.getElementById('loginForm');
const username = document.getElementById('username');
const password = document.getElementById('password');
const submitBtn = document.getElementById('submitBtn');
const passwordToggle = document.getElementById('password-toggle');

function validateForm() {
    const isValid = username.value.trim().length >= 3 && password.value.length >= 8;
    submitBtn.disabled = !isValid;
}

username.addEventListener('input', validateForm);
password.addEventListener('input', validateForm);

passwordToggle.addEventListener('click', () => {
    if (password.type === "password") {
        password.type = "text";
        passwordToggle.innerHTML = '<i class="bi bi-eye-slash-fill"></i>';
    } else {
        password.type = "password";
        passwordToggle.innerHTML = '<i class="bi bi-eye-fill"></i>';
    }
});
</script>
